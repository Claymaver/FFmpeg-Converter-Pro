name: Release Build

on:
  # Trigger manually from Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ inputs.version }}
          release_name: FFmpeg Converter Pro v${{ inputs.version }}
          body: |
            # FFmpeg Converter Pro v${{ inputs.version }}
            
            ## 📦 Downloads
            
            ### Windows
            - **Setup (64-bit)**: Recommended for most users
            - **Setup (32-bit)**: For older 32-bit Windows systems
            - **Portable**: No installation required, run from USB drive
            
            ### macOS
            - **Intel DMG**: For Intel-based Macs
            - **Apple Silicon DMG**: For M1/M2/M3/M4 Macs
            
            💡 **Tip**: Not sure which Mac you have? 
            - Click Apple menu → About This Mac
            - If you see "Apple M1/M2/M3" → Download Apple Silicon
            - If you see "Intel Core i5/i7/i9" → Download Intel
            
            ### Linux
            - **AppImage**: Works on all distributions (Recommended)
            - **DEB**: Debian, Ubuntu, Linux Mint, Pop!_OS
            - **RPM**: Fedora, RHEL, CentOS, openSUSE
            
            ## 🚀 Installation
            
            ### Windows
            1. Download the Setup.exe file
            2. Run the installer
            3. Follow the installation wizard
            
            ### macOS
            1. Download the appropriate DMG file for your Mac
            2. Open the DMG
            3. Drag the app to Applications
            4. First run: Right-click → Open
            
            ### Linux
            ```bash
            # AppImage
            chmod +x FFmpeg-Converter-Pro*.AppImage
            ./FFmpeg-Converter-Pro*.AppImage
            
            # DEB
            sudo apt install ./ffmpeg-converter-pro*.deb
            
            # RPM
            sudo dnf install ./ffmpeg-converter-pro*.rpm
            ```
            
            ## ✨ What's New
            
            - Initial release with VS Code-inspired interface
            - Professional video conversion powered by FFmpeg
            - Batch processing support
            - Real-time progress tracking
            - Problems tab with helpful error solutions
            - Beautiful About dialog
            - Keyboard shortcuts
            - Cross-platform support
            
            ## ⚠️ Requirements
            
            - **FFmpeg must be installed** on your system
            - Windows 10/11, macOS 10.13+, or modern Linux
            
            ## 📝 Checksums
            
            SHA256 checksums are provided for each platform to verify download integrity.
            See `checksums-*.txt` files in assets below.
          draft: false
          prerelease: ${{ inputs.prerelease }}
  
  build-and-upload:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            build_command: npm run build:win-all
          
          - os: macos-latest
            platform: macos
            arch: x64
            build_command: npm run build:mac-intel
          
          - os: macos-latest
            platform: macos
            arch: arm64
            build_command: npm run build:mac-arm
          
          - os: ubuntu-latest
            platform: linux
            arch: x64
            build_command: npm run build:linux-all
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg rpm
      
      - name: Build application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.build_command }}
      
      - name: Generate checksums (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem dist/*.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -Append checksums-windows.txt -Encoding ASCII
          }
          Get-Content checksums-windows.txt
      
      - name: Generate checksums (macOS/Linux)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          shasum -a 256 * > ../checksums-${{ matrix.platform }}.txt
          cat ../checksums-${{ matrix.platform }}.txt
      
      - name: Upload Windows x64 Setup to Release
        if: matrix.platform == 'windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/FFmpeg Converter Pro-${{ inputs.version }}-x64-Setup.exe
          asset_name: FFmpeg-Converter-Pro-${{ inputs.version }}-x64-Setup.exe
          asset_content_type: application/octet-stream
      
      - name: Upload Windows ia32 Setup to Release
        if: matrix.platform == 'windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/FFmpeg Converter Pro-${{ inputs.version }}-ia32-Setup.exe
          asset_name: FFmpeg-Converter-Pro-${{ inputs.version }}-ia32-Setup.exe
          asset_content_type: application/octet-stream
        continue-on-error: true
      
      - name: Upload Windows Portable to Release
        if: matrix.platform == 'windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/FFmpeg Converter Pro-${{ inputs.version }}-x64-Portable.exe
          asset_name: FFmpeg-Converter-Pro-${{ inputs.version }}-Portable.exe
          asset_content_type: application/octet-stream
        continue-on-error: true
      
      - name: Upload Windows Checksums to Release
        if: matrix.platform == 'windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: checksums-windows.txt
          asset_name: checksums-windows.txt
          asset_content_type: text/plain
      
      - name: Upload macOS Checksums to Release
        if: matrix.platform == 'macos'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: checksums-macos.txt
          asset_name: checksums-macos-${{ matrix.arch }}.txt
          asset_content_type: text/plain
      
      - name: Upload macOS x64 DMG to Release
        if: matrix.platform == 'macos' && matrix.arch == 'x64'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/FFmpeg Converter Pro-${{ inputs.version }}-x64.dmg
          asset_name: FFmpeg-Converter-Pro-${{ inputs.version }}-Intel.dmg
          asset_content_type: application/octet-stream
        continue-on-error: true
      
      - name: Upload macOS arm64 DMG to Release
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/FFmpeg Converter Pro-${{ inputs.version }}-arm64.dmg
          asset_name: FFmpeg-Converter-Pro-${{ inputs.version }}-AppleSilicon.dmg
          asset_content_type: application/octet-stream
        continue-on-error: true
      
      - name: Upload Linux AppImage to Release
        if: matrix.platform == 'linux'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/FFmpeg Converter Pro-${{ inputs.version }}-x64.AppImage
          asset_name: FFmpeg-Converter-Pro-${{ inputs.version }}.AppImage
          asset_content_type: application/octet-stream
        continue-on-error: true
      
      - name: Upload Linux DEB to Release
        if: matrix.platform == 'linux'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/ffmpeg-converter-pro_${{ inputs.version }}_amd64.deb
          asset_name: ffmpeg-converter-pro_${{ inputs.version }}_amd64.deb
          asset_content_type: application/octet-stream
        continue-on-error: true
      
      - name: Upload Linux RPM to Release
        if: matrix.platform == 'linux'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/ffmpeg-converter-pro-${{ inputs.version }}.x86_64.rpm
          asset_name: ffmpeg-converter-pro-${{ inputs.version }}.x86_64.rpm
          asset_content_type: application/octet-stream
        continue-on-error: true
      
      - name: Upload Linux Checksums to Release
        if: matrix.platform == 'linux'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: checksums-linux.txt
          asset_name: checksums-linux.txt
          asset_content_type: text/plain
