name: Release Build

on:
  # Trigger manually from Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ inputs.version }}
          release_name: FFmpeg Converter Pro v${{ inputs.version }}
          body: |
            # FFmpeg Converter Pro v${{ inputs.version }}
            
            ## 📦 Downloads
            
            ### Windows
            - **Setup (64-bit)**: Recommended for most users
            - **Setup (32-bit)**: For older 32-bit Windows systems
            - **Portable**: No installation required, run from USB drive
            
            ### macOS
            - **Intel DMG**: For Intel-based Macs
            - **Apple Silicon DMG**: For M1/M2/M3/M4 Macs
            
            💡 **Tip**: Not sure which Mac you have? 
            - Click Apple menu → About This Mac
            - If you see "Apple M1/M2/M3" → Download Apple Silicon
            - If you see "Intel Core i5/i7/i9" → Download Intel
            
            ### Linux
            - **AppImage**: Works on all distributions (Recommended)
            - **DEB**: Debian, Ubuntu, Linux Mint, Pop!_OS
            - **RPM**: Fedora, RHEL, CentOS, openSUSE
            
            ## 🚀 Installation
            
            ### Windows
            1. Download the Setup.exe file
            2. Run the installer
            3. Follow the installation wizard
            
            ### macOS
            1. Download the appropriate DMG file for your Mac
            2. Open the DMG
            3. Drag the app to Applications
            4. First run: Right-click → Open
            
            ### Linux
            ```bash
            # AppImage
            chmod +x FFmpeg-Converter-Pro*.AppImage
            ./FFmpeg-Converter-Pro*.AppImage
            
            # DEB
            sudo apt install ./ffmpeg-converter-pro*.deb
            
            # RPM
            sudo dnf install ./ffmpeg-converter-pro*.rpm
            ```
            
            ## ✨ What's New
            
            - Initial release with VS Code-inspired interface
            - Professional video conversion powered by FFmpeg
            - Batch processing support
            - Real-time progress tracking
            - Problems tab with helpful error solutions
            - Beautiful About dialog
            - Keyboard shortcuts
            - Cross-platform support
            
            ## ⚠️ Requirements
            
            - **FFmpeg must be installed** on your system
            - Windows 10/11, macOS 10.13+, or modern Linux
            
            ## 📝 Checksums
            
            SHA256 checksums are provided for each platform to verify download integrity.
            See `checksums-*.txt` files in assets below.
          draft: false
          prerelease: ${{ inputs.prerelease }}
  
  build-and-upload:
    name: Build ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg rpm
      
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win-all
      
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac
      
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux-all
      
      - name: Generate checksums (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem dist/*.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -Append checksums.txt -Encoding ASCII
          }
          Get-Content checksums.txt
      
      - name: Generate checksums (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          shasum -a 256 * > ../checksums.txt 2>/dev/null || true
          cat ../checksums.txt
      
      - name: Upload Windows Assets
        if: matrix.os == 'windows-latest'
        run: |
          gh release upload v${{ inputs.version }} dist/*.exe checksums.txt --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload macOS Assets
        if: matrix.os == 'macos-latest'
        run: |
          gh release upload v${{ inputs.version }} dist/*.dmg dist/*.zip checksums.txt --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Linux Assets
        if: matrix.os == 'ubuntu-latest'
        run: |
          gh release upload v${{ inputs.version }} dist/*.AppImage dist/*.deb dist/*.rpm checksums.txt --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
