name: Build & Release FFmpeg Converter Pro

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------
      # Setup Node
      # ------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ------------------------
      # Cache Electron
      # ------------------------
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      # ------------------------
      # Install dependencies
      # ------------------------
      - name: Install deps
        run: npm install

      # ------------------------
      # Clean build directory
      # ------------------------
      - name: Clean dist
        run: |
          npx rimraf dist
        shell: bash

      # ------------------------
      # Linux dependencies
      # ------------------------
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y fakeroot dpkg rpm libgconf-2-4 libappindicator3-1 libnotify4 libnss3 libxtst6

      # ------------------------
      # Build per OS
      # ------------------------
      - name: Build App
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            npx electron-builder --linux AppImage deb rpm
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            npx electron-builder --mac --universal
          else
            npx electron-builder --win --x64 --ia32
          fi
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ------------------------
      # Upload installers
      # ------------------------
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
          if-no-files-found: warn

      # ------------------------
      # Set version output
      # ------------------------
      - name: Set version output
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

    outputs:
      version: ${{ steps.version.outputs.version }}

  # ============================
  # Draft Release
  # ============================
  release:
    name: Draft Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.build.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}