name: Build & Release FFmpeg Converter Pro

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------
      # Get version (cross-platform safe)
      # ------------------------
      - name: Get version from package.json
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      # ------------------------
      # Setup Node + cache
      # ------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ------------------------
      # Cache Electron / builder
      # ------------------------
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm install

      # ------------------------
      # Clean previous builds (ALL OS)
      # ------------------------
      - name: Clean dist
        shell: bash
        run: |
          rm -rf dist

      # ------------------------
      # Linux setup + build
      # ------------------------
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y fakeroot dpkg rpm

      - name: Run Linux build
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x build-linux.sh
          ./build-linux.sh

      # ------------------------
      # macOS build (fixed)
      # ------------------------
      - name: Run macOS build
        if: matrix.os == 'macos-latest'
        run: |
          chmod +x build-mac.sh
          ./build-mac.sh

      # ------------------------
      # Windows build (fixed shell)
      # ------------------------
      - name: Run Windows build
        if: matrix.os == 'windows-latest'
        run: build-win.bat
        shell: cmd

      # ------------------------
      # Upload installers only
      # ------------------------
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
          if-no-files-found: warn

  # ============================
  # RELEASE JOB (DRAFT)
  # ============================
  release:
    name: Create Draft Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifact structure
        run: ls -R artifacts

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.build.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}