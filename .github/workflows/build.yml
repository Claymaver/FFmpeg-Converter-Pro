name: Build Installers

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows builds
          - os: windows-latest
            platform: windows
            arch: x64
            build_command: npm run build:win
          
          # macOS builds
          - os: macos-latest
            platform: macos
            arch: x64
            build_command: npm run build:mac-intel
          
          - os: macos-latest
            platform: macos
            arch: arm64
            build_command: npm run build:mac-arm
          
          # Linux builds
          - os: ubuntu-latest
            platform: linux
            arch: x64
            build_command: npm run build:linux-all
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg rpm
      
      - name: Build application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.build_command }}
      
      - name: List build outputs
        run: |
          echo "=== Build outputs in dist folder ==="
          ls -lah dist/ || dir dist\
        shell: bash
      
      # Windows artifacts
      - name: Upload Windows x64 Setup
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-setup
          path: dist/*-x64-Setup.exe
          retention-days: 30
          if-no-files-found: warn
      
      - name: Upload Windows ia32 Setup
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-ia32-setup
          path: dist/*-ia32-Setup.exe
          retention-days: 30
          if-no-files-found: warn
      
      - name: Upload Windows Portable
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/*-Portable.exe
          retention-days: 30
          if-no-files-found: warn
      
      # macOS artifacts
      - name: Upload macOS x64 DMG
        if: matrix.platform == 'macos' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-dmg
          path: dist/*.dmg
          retention-days: 30
          if-no-files-found: warn
      
      - name: Upload macOS x64 ZIP
        if: matrix.platform == 'macos' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-zip
          path: dist/*.zip
          retention-days: 30
          if-no-files-found: warn
      
      - name: Upload macOS arm64 DMG
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dmg
          path: dist/*.dmg
          retention-days: 30
          if-no-files-found: warn
      
      - name: Upload macOS arm64 ZIP
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-zip
          path: dist/*.zip
          retention-days: 30
          if-no-files-found: warn
      
      # Linux artifacts
      - name: Upload Linux AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          retention-days: 30
          if-no-files-found: warn
      
      - name: Upload Linux DEB
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb
          retention-days: 30
          if-no-files-found: warn
      
      - name: Upload Linux RPM
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: dist/*.rpm
          retention-days: 30
          if-no-files-found: warn
  
  # Summary job - runs after all builds complete
  build-summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      
      - name: Display artifact summary
        run: |
          echo "=== Build Artifacts Summary ==="
          echo ""
          echo "Windows:"
          ls -lh all-artifacts/windows-*/ 2>/dev/null || echo "  No Windows builds"
          echo ""
          echo "macOS:"
          ls -lh all-artifacts/macos-*/ 2>/dev/null || echo "  No macOS builds"
          echo ""
          echo "Linux:"
          ls -lh all-artifacts/linux-*/ 2>/dev/null || echo "  No Linux builds"
          echo ""
          echo "=== Total artifacts ==="
          find all-artifacts -type f | wc -l
          echo ""
          echo "Download artifacts from the Actions tab above!"
